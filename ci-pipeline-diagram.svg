<svg xmlns="http://www.w3.org/2000/svg" width="520" height="560" viewBox="0 0 520 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- ── STEP 1: CI Pipeline Trigger ── -->
  <g filter="url(#cardShadow)">
    <rect x="110" y="20" width="300" height="86" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  </g>
  <rect x="110" y="20" width="6" height="86" rx="3" fill="#7c3aed"/>
  <circle cx="158" cy="63" r="22" fill="#ede9fe"/>
  <text x="158" y="70" text-anchor="middle" font-size="18">⚡</text>
  <text x="192" y="51" fill="#7c3aed" font-size="10" font-weight="700" letter-spacing="2">STEP 01</text>
  <text x="192" y="69" fill="#1e1b4b" font-size="15" font-weight="700">CI Pipeline Trigger</text>
  <text x="192" y="88" fill="#6b7280" font-size="11">Push · Pull Request · Schedule</text>

  <!-- Connector 1→2 -->
  <line x1="260" y1="106" x2="260" y2="136" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="218" y="114" width="84" height="16" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="260" y="126" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600" letter-spacing="1">TRIGGER</text>

  <!-- ── STEP 2: Install Dependencies ── -->
  <g filter="url(#cardShadow)">
    <rect x="110" y="140" width="300" height="86" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  </g>
  <rect x="110" y="140" width="6" height="86" rx="3" fill="#2563eb"/>
  <circle cx="158" cy="183" r="22" fill="#dbeafe"/>
  <text x="158" y="190" text-anchor="middle" font-size="18">📦</text>
  <text x="192" y="171" fill="#2563eb" font-size="10" font-weight="700" letter-spacing="2">STEP 02</text>
  <text x="192" y="189" fill="#1e3a8a" font-size="15" font-weight="700">Install Dependencies</text>
  <text x="192" y="208" fill="#6b7280" font-size="11">npm install · pip install · cache</text>

  <!-- Connector 2→3 -->
  <line x1="260" y1="226" x2="260" y2="256" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="212" y="234" width="96" height="16" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="260" y="246" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600" letter-spacing="1">INSTALLED</text>

  <!-- ── STEP 3: Execute Tests ── -->
  <g filter="url(#cardShadow)">
    <rect x="110" y="260" width="300" height="86" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  </g>
  <rect x="110" y="260" width="6" height="86" rx="3" fill="#16a34a"/>
  <circle cx="158" cy="303" r="22" fill="#dcfce7"/>
  <text x="158" y="310" text-anchor="middle" font-size="18">🧪</text>
  <text x="192" y="291" fill="#16a34a" font-size="10" font-weight="700" letter-spacing="2">STEP 03</text>
  <text x="192" y="309" fill="#14532d" font-size="15" font-weight="700">Execute Tests</text>
  <text x="192" y="328" fill="#6b7280" font-size="11">Unit · Integration · Coverage</text>

  <!-- Connector 3→4 -->
  <line x1="260" y1="346" x2="260" y2="376" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="218" y="354" width="84" height="16" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="260" y="366" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600" letter-spacing="1">PASSED</text>

  <!-- ── STEP 4: Generate Reports ── -->
  <g filter="url(#cardShadow)">
    <rect x="110" y="380" width="300" height="86" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  </g>
  <rect x="110" y="380" width="6" height="86" rx="3" fill="#d97706"/>
  <circle cx="158" cy="423" r="22" fill="#fef3c7"/>
  <text x="158" y="430" text-anchor="middle" font-size="18">📊</text>
  <text x="192" y="411" fill="#d97706" font-size="10" font-weight="700" letter-spacing="2">STEP 04</text>
  <text x="192" y="429" fill="#78350f" font-size="15" font-weight="700">Generate Reports</text>
  <text x="192" y="448" fill="#6b7280" font-size="11">Coverage · Artifacts · Summary</text>

  <!-- Footer -->
  <line x1="110" y1="490" x2="410" y2="490" stroke="#e5e7eb" stroke-width="1"/>
  <text x="260" y="512" text-anchor="middle" fill="#9ca3af" font-size="10" letter-spacing="1">Automated  ·  Reproducible  ·  Observable</text>
</svg>
